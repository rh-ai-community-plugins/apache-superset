apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "superset.fullname" . }}
  labels:
    {{- include "superset.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "superset.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "superset.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/superset-configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/superset-secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "superset.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for PostgreSQL..."
              until python -c "
              import socket, sys, os
              host = os.environ.get('PGHOST', '{{ include "superset.postgres.fullname" . }}-svc')
              try:
                  s = socket.create_connection((host, 5432), timeout=2)
                  s.close()
                  sys.exit(0)
              except Exception:
                  sys.exit(1)
              " 2>/dev/null; do
                sleep 2
              done
              echo "PostgreSQL is ready."
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
        - name: superset-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "Running database migrations..."
              superset db upgrade
              echo "Creating admin user..."
              output=$(superset fab create-admin \
                --username "${SUPERSET_ADMIN_USERNAME}" \
                --firstname "${SUPERSET_ADMIN_FIRSTNAME}" \
                --lastname "${SUPERSET_ADMIN_LASTNAME}" \
                --email "${SUPERSET_ADMIN_EMAIL}" \
                --password "${SUPERSET_ADMIN_PASSWORD}" 2>&1) || {
                rc=$?
                if echo "$output" | grep -q "already exists"; then
                  echo "Admin user already exists, skipping."
                else
                  printf 'create-admin failed (exit %d):\n%s\n' "$rc" "$output" >&2
                  exit $rc
                fi
              }
              echo "$output"
              echo "Initializing Superset..."
              superset init
              echo "Init complete."
          envFrom:
            - secretRef:
                name: {{ include "superset.fullname" . }}-secret
          volumeMounts:
            - name: config
              mountPath: /app/pythonpath/superset_config.py
              subPath: superset_config.py
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      containers:
        - name: superset
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: {{ .Values.port | int }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "superset.fullname" . }}-secret
          env:
            - name: SUPERSET_PORT
              value: {{ .Values.port | quote }}
          volumeMounts:
            - name: config
              mountPath: /app/pythonpath/superset_config.py
              subPath: superset_config.py
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "superset.fullname" . }}-config
