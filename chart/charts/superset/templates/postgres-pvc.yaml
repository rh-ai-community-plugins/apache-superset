apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "superset.postgres.fullname" . }}-pv
  labels:
    {{- include "superset.postgres.labels" . | nindent 4 }}
  {{- if .Values.postgres.persistence.keepOnUninstall }}
  annotations:
    "helm.sh/resource-policy": keep
  {{- end }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.postgres.persistence.storageClass }}
  storageClassName: {{ .Values.postgres.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size }}
