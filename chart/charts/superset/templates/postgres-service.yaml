apiVersion: v1
kind: Service
metadata:
  name: {{ include "superset.postgres.fullname" . }}-svc
  labels:
    {{- include "superset.postgres.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: tcp-postgres
      protocol: TCP
      name: tcp-postgres
  selector:
    {{- include "superset.postgres.selectorLabels" . | nindent 4 }}
