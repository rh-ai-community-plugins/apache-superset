{{/*
Validate that postgres.password contains only alphanumeric characters.
The password is interpolated directly into the SQLAlchemy connection URI
(postgresql+psycopg2://user:PASSWORD@host/db). URI-special characters such as
@, :, /, %, and # are not URL-encoded and would produce a malformed URI.
*/}}
{{- $pg := required "postgres.password is required" .Values.postgres.password }}
{{- if not (regexMatch "^[A-Za-z0-9]+$" $pg) }}
{{- fail "postgres.password must contain only alphanumeric characters (A-Z, a-z, 0-9). Special characters such as @, :, /, %, and # are not URL-encoded in the SQLAlchemy connection URI and will cause Superset to fail to connect." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "superset.fullname" . }}-secret
  labels:
    {{- include "superset.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  {{- if .Values.postgres.persistence.keepOnUninstall }}
  annotations:
    "helm.sh/resource-policy": keep
  {{- end }}
type: Opaque
stringData:
  SUPERSET_SECRET_KEY: {{ required "secretKey is required" .Values.secretKey | quote }}
  SUPERSET_GUEST_TOKEN_JWT_SECRET: {{ default .Values.secretKey .Values.embedding.guestTokenJwtSecret | quote }}
  SUPERSET_GUEST_TOKEN_JWT_EXP_SECONDS: {{ .Values.embedding.guestTokenExpSeconds | quote }}
  SUPERSET_ADMIN_USERNAME: {{ .Values.admin.username | quote }}
  SUPERSET_ADMIN_PASSWORD: {{ required "admin.password is required" .Values.admin.password | quote }}
  SUPERSET_ADMIN_FIRSTNAME: {{ .Values.admin.firstName | quote }}
  SUPERSET_ADMIN_LASTNAME: {{ .Values.admin.lastName | quote }}
  SUPERSET_ADMIN_EMAIL: {{ .Values.admin.email | quote }}
  SUPERSET_SQLALCHEMY_DATABASE_URI: {{ include "superset.postgres.uri" . | quote }}
  SUPERSET_ALLOWED_ORIGINS: {{ .Values.embedding.allowedOrigins | quote }}
  SUPERSET_FORCE_HTTPS: {{ .Values.tls.forceHttps | quote }}
  POSTGRES_PASSWORD: {{ required "postgres.password is required" .Values.postgres.password | quote }}
