# Default values for apache-superset.
# This is a YAML-formatted file.

image:
  repository: quay.io/OWNER/apache-superset
  tag: ""
  pullPolicy: IfNotPresent

# Overrides .Chart.Name so deployed resources use the plugin name, not the
# chart name (which has a -chart suffix to avoid OCI registry collisions).
nameOverride: "apache-superset"
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

replicaCount: 1

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /apache-superset
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

securityContext:
  runAsNonRoot: true

nodeSelector: {}

tolerations: []

affinity: {}

# Superset instance (deployed on-demand per namespace)
superset:
  enabled: false
  image:
    repository: quay.io/OWNER/apache-superset-server
    tag: ""
  port: 8088
  admin:
    username: admin
    password: ""
    firstName: Superset
    lastName: Admin
    email: admin@superset.local
  embedding:
    enabled: true
    guestTokenJwtSecret: ""
    guestTokenExpSeconds: 300
    allowedOrigins: ""
  secretKey: ""
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  serviceAccount:
    create: true
    annotations: {}
    name: ""
  postgres:
    image:
      repository: registry.redhat.io/rhel9/postgresql-16
      tag: "latest"
      pullPolicy: IfNotPresent
    password: ""
    database: superset
    user: superset
    persistence:
      size: 5Gi
      storageClass: ""
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  tls:
    forceHttps: "false"
  route:
    enabled: false
    host: ""
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  securityContext:
    runAsNonRoot: true

# BFF (Backend For Frontend) service
bff:
  enabled: true
  image:
    repository: quay.io/OWNER/apache-superset-bff
    tag: ""
    pullPolicy: IfNotPresent
  chartDir: /opt/app-root/src/chart-templates/superset
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
