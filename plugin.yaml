# --- Plugin identity (required) ---
name: apache-superset                    # [PLUGIN-SPECIFIC] unique plugin identifier (kebab-case)
displayName: Apache Superset             # [PLUGIN-SPECIFIC] human-readable name
description: Community plugin that deploys Apache Superset on-demand and embeds dashboards inline within the RHOAI Dashboard
version: 0.1.0

# --- Maintainer (required) ---
maintainer:                          # [PLUGIN-SPECIFIC]
  name: Guillaume Moutier                    # [PLUGIN-SPECIFIC] replace with maintainer's name
  github: guimou        # [PLUGIN-SPECIFIC] replace with maintainer's GitHub handle

# --- RHOAI compatibility (required) ---
rhoai_compatibility:                 # [PLUGIN-SPECIFIC]
  min_version: "3.3.0"
  tested_versions: ["3.3.0", "3.4.2"]

# --- Deployment (required) ---
deployment_model: cluster-shared     # per-project | cluster-shared | both

image:                               # [PLUGIN-SPECIFIC]
  repository: quay.io/rh-ai-community-plugins/apache-superset
  tag: "0.1.0"

bff_image:                           # [PLUGIN-SPECIFIC] (optional — only if using BFF pattern)
  repository: quay.io/rh-ai-community-plugins/apache-superset-bff
  tag: "0.1.0"

# --- Installation (required) ---
install:
  method: automatic                  # automatic | assisted | manual
  helm:
    chart_path: chart/
    registry: oci://quay.io/rh-ai-community-plugins/apache-superset-chart  # [PLUGIN-SPECIFIC]
  prerequisites: []
  instructions: https://github.com/rh-ai-community-plugins/apache-superset/blob/main/docs/deployment  # [PLUGIN-SPECIFIC]

# --- Dashboard integration (required) ---
remote:
  type: module-federation
  spec:
    name: apacheSuperset                 # [PLUGIN-SPECIFIC] Module Federation container name (camelCase)
    scope: apacheSuperset                # [PLUGIN-SPECIFIC] must match name above
    # [PLUGIN-SPECIFIC] Update this URL to point to your deployed OpenShift route.
    # The URL is cluster-specific and depends on the route created by the Helm chart or Ingress.
    # Example: https://apache-superset-mynamespace.apps.mycluster.example.com/remoteEntry.js
    remoteEntry: https://<your-openshift-route>/remoteEntry.js  # [PLUGIN-SPECIFIC]
    paths:
      - type: route
        path: /apache-superset           # [PLUGIN-SPECIFIC] must match route prefix in extensions.ts
        extensions:
          - apacheSuperset/extensions     # [PLUGIN-SPECIFIC] {scope}/extensions
      - type: icon
        path: apacheSuperset/Icon         # [PLUGIN-SPECIFIC] {scope}/Icon

# --- RBAC (required) ---
# The plugin itself requires no cluster roles at install time. However, users
# who deploy Superset instances need namespace-scoped RBAC permissions for
# create/get/list/update/delete on the following resources (via the BFF's K8s API calls):
#   - apps/deployments
#   - core/services, core/configmaps, core/secrets, core/persistentvolumeclaims
#   - core/serviceaccounts
#   - route.openshift.io/routes
rbac:
  required_roles:
    - apiGroups: ["apps"]
      resources: ["deployments"]
      verbs: ["create", "get", "list", "update", "delete"]
    - apiGroups: [""]
      resources: ["services", "configmaps", "secrets", "persistentvolumeclaims", "serviceaccounts"]
      verbs: ["create", "get", "list", "update", "delete"]
    - apiGroups: ["route.openshift.io"]
      resources: ["routes"]
      verbs: ["create", "get", "list", "update", "delete"]
  cluster_roles: false

# --- Support (optional) ---
support:
  repo: https://github.com/rh-ai-community-plugins/apache-superset   # [PLUGIN-SPECIFIC]
  docs: https://github.com/rh-ai-community-plugins/apache-superset/tree/main/docs
  issues: https://github.com/rh-ai-community-plugins/apache-superset/issues
